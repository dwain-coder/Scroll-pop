name = "scrollpop-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
API_ORIGIN = "http://127.0.0.1:3001"
INTERNAL_SECRET = "change_me_in_production_32_chars_min"

[[kv_namespaces]]
binding = "SCROLLPOP_CONFIG"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[r2_buckets]]
binding = "SNIPPETS"
bucket_name = "scrollpop-snippets"
preview_bucket_name = "scrollpop-snippets-preview"

[[routes]]
# Edge API routes
pattern = "edge.scrollpop.io/*"
zone_name = "scrollpop.io"

[[routes]]
# CDN routes (snippet delivery)
pattern = "cdn.scrollpop.io/*"
zone_name = "scrollpop.io"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging", API_ORIGIN = "https://api-staging.scrollpop.io" }
