name = "scrollpop-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Non-secret vars (safe to commit) ──────────────────────────────────────────
[vars]
API_ORIGIN = "https://scroll-pop.onrender.com"
# INTERNAL_SECRET is set via: wrangler secret put INTERNAL_SECRET
# NOTE: INTERNAL_SECRET (here) MUST equal INTERNAL_SECRET on the Render API, or
# the Worker's config origin calls are rejected with 401.

# ── Custom domains (auto-provisions DNS + TLS on deploy) ──────────────────────
# Both hostnames route to this same Worker:
#   cdn.scrollpop.online/v1/:publicKey/p.js   → snippet bundle
#   edge.scrollpop.online/c/:publicKey        → site config
#   edge.scrollpop.online/e                   → event ingest
# Requires the scrollpop.online zone in this Cloudflare account and a deploy
# token with Zone:DNS:Edit + Workers Scripts:Edit.
[[routes]]
pattern = "cdn.scrollpop.online"
custom_domain = true

[[routes]]
pattern = "edge.scrollpop.online"
custom_domain = true

# ── KV Namespace: campaign config cache ───────────────────────────────────────
# TODO: Create KV namespace in Cloudflare dashboard and add IDs here
# Run: wrangler kv namespace create SCROLLPOP_CONFIG
# Then update both id and preview_id below
# [[kv_namespaces]]
# binding = "SCROLLPOP_CONFIG"
# id = "YOUR_KV_NAMESPACE_ID"
# preview_id = "YOUR_KV_NAMESPACE_ID"

# ── Secrets (set via `wrangler secret put <NAME>` — never commit values) ──────
# Required secrets:
#   REDIS_URL        — Upstash Redis REST URL  (wrangler secret put REDIS_URL)
#   REDIS_TOKEN      — Upstash Redis token     (wrangler secret put REDIS_TOKEN)
#   SENTRY_DSN       — Sentry DSN              (wrangler secret put SENTRY_DSN)
#
# To set for production:
#   pnpm wrangler secret put REDIS_URL --env production
#   pnpm wrangler secret put REDIS_TOKEN --env production
#   pnpm wrangler secret put SENTRY_DSN --env production

[env.production]
vars = { ENVIRONMENT = "production", API_ORIGIN = "https://scroll-pop.onrender.com" }

[env.staging]
vars = { ENVIRONMENT = "staging", API_ORIGIN = "https://scroll-pop-staging.onrender.com" }
