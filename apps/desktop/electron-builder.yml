appId: io.scrollpop.desktop
productName: ScrollPop
copyright: Copyright © 2025 ScrollPop

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: ../../apps/dashboard/dist
    to: dashboard
    filter:
      - '**/*'
  - from: ../../packages/snippet/dist
    to: snippet
    filter:
      - 'p.js'
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm

asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm

win:
  target:
    - target: nsis
      arch: [x64, arm64]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  category: Office

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ScrollPop

publish:
  provider: github
  owner: scrollpop
  repo: scrollpop-desktop
  releaseType: release
