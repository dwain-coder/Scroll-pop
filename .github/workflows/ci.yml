name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.1.1'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  snippet-size-check:
    name: Snippet Size Budgets (core ≤10KB · lazy chunks capped)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter snippet build
      - name: Check per-chunk gzipped budgets
        run: |
          # Per-module budgets (gzipped bytes). Core (p.js) ≤10KB hard cap (8KB target);
          # each lazy chunk has its own cap. A new/unknown chunk defaults to 3KB so a module
          # can never silently bloat the payload. Bump a budget here intentionally if needed.
          BUNDLE="packages/snippet/dist/p.js"
          if [ ! -f "$BUNDLE" ]; then echo "❌ Core bundle not found at $BUNDLE"; exit 1; fi
          declare -A BUDGETS=( ["p.js"]=10240 ["spin.js"]=3072 ["journey.js"]=3072 ["targeting.js"]=2048 )
          DEFAULT=3072
          fail=0
          shopt -s nullglob
          for f in packages/snippet/dist/*.js; do
            name=$(basename "$f")
            budget=${BUDGETS[$name]:-$DEFAULT}
            size=$(gzip -c "$f" | wc -c)
            if [ "$size" -gt "$budget" ]; then
              echo "❌ FAIL: $name ${size}B > ${budget}B budget"; fail=1
            else
              echo "✅ $name ${size}B / ${budget}B"
            fi
          done
          [ "$fail" -eq 0 ] || { echo "One or more chunks exceeded budget"; exit 1; }
          echo "✅ PASS: all chunks within budget"
      - name: Snippet integrity gate (Worker bundle must equal audited source)
        # `pnpm --filter snippet build` rebuilds dist/p.js AND syncs apps/worker/src/p.txt.
        # If the committed p.txt differs from a fresh build, it's either stale or tampered —
        # this guarantees the edge serves exactly the reviewed snippet source.
        run: |
          if ! git diff --quiet -- apps/worker/src/p.txt; then
            echo "❌ FAIL: apps/worker/src/p.txt does not match the freshly built snippet."
            echo "   Someone edited p.txt directly, or forgot to rebuild after a snippet change."
            echo "   Fix: run 'pnpm --filter snippet build' and commit the updated p.txt."
            git diff --stat -- apps/worker/src/p.txt
            exit 1
          fi
          echo "✅ PASS: Worker snippet bundle is byte-identical to the built source"

  no-history-manipulation:
    # ⚠️ MARKETING DEPENDENCY — do not remove or weaken this gate.
    # The scrollpop.online website states that history manipulation is
    # "blocked at the code level — enforced on every release".
    # Removing this check makes that claim false advertising.
    # If you need to change scope, update site-plan/src/components/HomeView.tsx first.
    name: No history.* / popstate in snippet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for banned APIs in snippet source
        run: |
          BANNED_PATTERNS=(
            "history\.pushState"
            "history\.replaceState"
            "onpopstate"
            "addEventListener.*popstate"
            "back_button_capture"
          )
          SNIPPET_DIR="packages/snippet/src"
          FAILED=0
          for pattern in "${BANNED_PATTERNS[@]}"; do
            if grep -rE "$pattern" "$SNIPPET_DIR" 2>/dev/null; then
              echo "❌ BANNED API FOUND: $pattern"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ FAIL: Snippet contains banned navigation manipulation APIs"
            echo "See CLAUDE.md rule #1 for details."
            exit 1
          fi
          echo "✅ PASS: No banned APIs found in snippet source"

  migration-safety:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for destructive SQL in new migrations
        run: |
          MIGRATION_DIR="apps/api/drizzle/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "No migrations directory found — skipping"
            exit 0
          fi
          # Find migration files changed/added in this PR vs. main
          CHANGED=$(git diff --name-only origin/main...HEAD -- "$MIGRATION_DIR" 2>/dev/null || \
                    git diff --name-only HEAD~1...HEAD -- "$MIGRATION_DIR" 2>/dev/null || \
                    echo "")
          if [ -z "$CHANGED" ]; then
            echo "✅ No migration files changed"
            exit 0
          fi
          echo "Checking migrations: $CHANGED"
          FAILED=0
          for file in $CHANGED; do
            if [ ! -f "$file" ]; then continue; fi
            # Flag destructive DDL that must be reviewed
            if grep -iE '^\s*(DROP\s+TABLE|TRUNCATE\s+TABLE|DROP\s+COLUMN|DROP\s+SCHEMA)' "$file"; then
              echo "❌ DESTRUCTIVE DDL detected in $file — add a '-- REVIEWED: intentional' comment to proceed"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Destructive migration detected. Verify intent and add '-- REVIEWED: intentional' to suppress."
            exit 1
          fi
          echo "✅ No unreviewed destructive DDL in migration files"

  # E2E is intentionally NOT in any deploy job's `needs` list — it provides signal but
  # never blocks a release (browser E2E can be environment-flaky). Promote it to a gate
  # once it has proven stable over time.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The snippet fixture suite asserts against the built bundle.
      - run: pnpm --filter snippet build
      - name: Install Playwright (chromium + system deps)
        run: pnpm --filter @scrollpop/e2e exec playwright install --with-deps chromium
      - name: Run E2E suite
        run: pnpm --filter @scrollpop/e2e run e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  deploy-api:
    name: Deploy API → Render (production)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, snippet-size-check, no-history-manipulation, migration-safety]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render production deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✅ Render production deploy triggered"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL not set — Render auto-deploys on push"
          fi


  deploy-worker:
    name: Deploy Worker → Cloudflare
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, snippet-size-check, no-history-manipulation, migration-safety]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter snippet build
      - name: Deploy Worker
        working-directory: apps/worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⏭️  CLOUDFLARE_API_TOKEN not set on this repo — skipping Worker deploy."
            echo "    (The Worker is deployed from the repo that holds the Cloudflare secrets.)"
            exit 0
          fi
          node -e "require('fs').copyFileSync('../../packages/snippet/dist/p.js', 'src/p.txt')"
          npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Upload snippet to R2
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⏭️  CLOUDFLARE_API_TOKEN not set — skipping R2 upload."
            exit 0
          fi
          # Upload EVERY built chunk (p.js core + every lazy chunk like spin.js). Looping over
          # dist/*.js means a newly-added chunk can never ship without its R2 object — that gap
          # is exactly what made spin.js 404 and the wheel never render.
          for f in packages/snippet/dist/*.js; do
            echo "Uploading $(basename "$f") to R2…"
            npx wrangler r2 object put "scrollpop-assets/$(basename "$f")" \
              --file "$f" --content-type application/javascript
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-dashboard:
    name: Deploy Dashboard → Cloudflare Pages (production)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, snippet-size-check, no-history-manipulation, migration-safety]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build dashboard
        working-directory: apps/dashboard
        run: pnpm build
        env:
          VITE_API_URL: 'https://scroll-pop.onrender.com'
          VITE_CLERK_PUBLISHABLE_KEY: 'pk_live_Y2xlcmsuc2Nyb2xscG9wLm9ubGluZSQ'
          VITE_SENTRY_DSN: 'https://272c6d34c52f23066f09d938eb7cc194@o4511502643167232.ingest.us.sentry.io/4511505632657408'
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      - name: Deploy to Cloudflare Pages (production)
        working-directory: apps/dashboard
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⏭️  CLOUDFLARE_API_TOKEN not set — skipping dashboard deploy."
            exit 0
          fi
          npx wrangler pages deploy dist \
            --project-name=scrollpop-dashboard \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}


