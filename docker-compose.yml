version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: scrollpop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scrollpop
      POSTGRES_PASSWORD: scrollpop_dev
      POSTGRES_DB: scrollpop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrollpop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scrollpop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
